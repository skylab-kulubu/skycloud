server {
    listen 80;
    server_name nextcloud.farukerdem.page;
    return 301 https://$server_name$request_uri;
 }
  server {
    listen 443 ssl;
    server_name nextcloud.farukerdem.page;

    ssl_certificate /etc/nginx/ssl/live/farukerdem.page/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/farukerdem.page/privkey.pem;


    location / {
        proxy_pass http://$external_ip:80; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

